<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RS3 Tile Marker</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        background: #1a1a2e;
        color: #eee;
        overflow: hidden;
      }

      #root {
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
      }

      .leaflet-container {
        height: 100%;
        width: 100%;
        background: #0f0f1a;
      }

      .leaflet-control-attribution {
        display: none;
      }

      /* Custom marker styles */
      .tile-marker {
        border: 2px solid rgba(255, 255, 255, 0.8);
        border-radius: 2px;
      }

      .player-marker {
        border: 3px solid #00ff00;
        border-radius: 50%;
        background: rgba(0, 255, 0, 0.3);
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      }
    </style>
  <script defer src="./js/runtime.bundle.js"></script><script defer src="./js/vendor-react.bundle.js"></script><script defer src="./js/vendor-leaflet.bundle.js"></script><script defer src="./js/vendors.bundle.js"></script><script defer src="./js/main.bundle.js"></script><link href="./assets/css/main.css" rel="stylesheet"></head>
  <body>
    <div id="root"></div>
  </body>
</html>

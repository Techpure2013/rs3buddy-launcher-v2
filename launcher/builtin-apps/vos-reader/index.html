<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VoS Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Voice of Seren</h1>
    <div class="status" id="status">Connecting...</div>

    <div class="current-vos" id="currentVos" style="display:none;">
      <div class="current-vos-label">Current Voice of Seren</div>
      <div class="current-vos-clans" id="currentVosClans"></div>
      <div class="current-vos-source" id="currentVosSource"></div>
    </div>

    <div class="capture-section">
      <div class="preview-row" id="previewRow" style="display:none;">
        <canvas id="preview1" width="60" height="60"></canvas>
        <span class="separator">&amp;</span>
        <canvas id="preview2" width="60" height="60"></canvas>
      </div>
      <button class="btn btn-primary" id="captureBtn" disabled>Capture</button>
      <div class="capture-note">Detect from game client</div>
    </div>

    <div class="result" id="result"></div>
    <div class="log" id="log"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>

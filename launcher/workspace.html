<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https:;">
  <title>RS3 Launcher Buddy Workspace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 36px;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .toolbar {
      display: flex;
      align-items: center;
      height: 36px;
      padding: 0 8px;
      gap: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 12px;
      color: #0af;
      -webkit-app-region: no-drag;
    }

    .brand-logo {
      width: 20px;
      height: 20px;
    }

    .divider {
      width: 1px;
      height: 20px;
      background: rgba(255, 255, 255, 0.2);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }

    .status-dot.loading {
      background: #fbbf24;
      animation: pulse 1s infinite;
    }

    .status-dot.disconnected {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .apps-container {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      -webkit-app-region: no-drag;
    }

    .app-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .app-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .app-btn-icon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
    }

    #add-app-btn {
      background: rgba(0, 170, 255, 0.2);
      color: #0af;
    }

    #add-app-btn:hover {
      background: rgba(0, 170, 255, 0.3);
    }

    .window-controls {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    .window-controls button {
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .window-controls button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #btn-close:hover {
      background: #ef4444;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>RS3 Launcher Buddy</span>
    </div>

    <div class="divider"></div>

    <div class="status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Initializing...</span>
    </div>

    <div class="divider"></div>

    <div class="apps-container" id="apps-container">
      <button class="app-btn" id="add-app-btn">+ Add</button>
    </div>

    <div class="window-controls">
      <button id="btn-minimize" title="Hide overlay">_</button>
      <button id="btn-close" title="Close overlay">X</button>
    </div>
  </div>

  <script src="workspaceRenderer.js"></script>
</body>
</html>
